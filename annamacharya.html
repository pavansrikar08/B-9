<!DOCTYPE html>
<html>
<head>
    <title>Anil University Login</title>
    <link rel="stylesheet"href="annamacharya.css">
</head>

<body style="font-family: Arial; background-color:#18b16a3d;">

    <center>
        <h1>Anil University</h1>
        <h2>Student Login</h2>

        <form>
            <table border="0" cellpadding="10">
                
                <tr>
                    <td>Username:</td>
                    <td>
                        <input type="text" name="username" placeholder="Enter Username">
                    </td>
                </tr>

                <tr>
                    <td>Password:</td>
                    <td>
                        <input type="password" name="password" placeholder="Enter Password">
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="Login">
                        <input type="reset" value="Clear">
                    </td>
                </tr>

            </table>
        </form>

    </center>

</body>
</html>
