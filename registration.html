<html lan="en">
    <head>
        <b>Registration Form</b>
    </head>
    <body>
        <h1>Student Resigstration form </h1>
        <link rel="stylesheet" href="registration.css">
        <form>
            <label>First Name:</label><br>
            <input type="text" name="first name" required><br><br>

            <label>Last Name:</label><br>
            <input type="text" name="Last name" required><br><br>

            <label>Email:</label><br>
            <input type="email" name="Email" required><br><br>

            <label>phone no:</label><br>
            <input type="tel" name="phone no" required><br><br>

            <label>Gender:</label><br>
            <input type="radio" name="gender" value="male">male
            <input type="radio" name="gender" value="female">female
            <input type="radio" name="gender" value="other">other
            <br><br>

            <label>Course:</label><br>
            <select name="course">
                <option value="">---Select Course--</option>
                <option value="BCA">BCA</option>
                <option value="B.Tech">B.Tech</option>
                <option value="BBA">BBA</option>
            </select>
            <br><br>

            <label>Address:</label><br>
            <textarea name="address",rows="4"cols="30"></textarea>
            <label>Hobbies:</label><br>
            <input type="Checkbox" name="hobby" value="Reading">Reading
            <input type="Checkbox" name="hobby" value="Sports">Sports
            <input type="Checkbox" name="hobby" value="Music">Music
            <br><br>

            <input type="Submit" value="Register">
            <input type="Reset" value="Clear">
        </form>
    </body>
</html>
